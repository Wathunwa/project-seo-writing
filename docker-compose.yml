services:
  web1:
    build: .
    container_name: ai_seo_web1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Optional: add OPENAI_API_KEY when switching to real AI
    env_file: .env.local

  web2:
    build: .
    container_name: ai_seo_web2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # env_file: .env
    env_file: .env.local

  nginx:
    image: nginx:alpine
    container_name: ai_seo_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web1
      - web2
